<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XTagger</title>
  <style>
    /* ── Reset ────────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── CSS custom properties (light default, dark override) ────────────── */
    :root {
      --bg:        #ffffff;
      --bg2:       #f7f7f7;
      --bg3:       #ebebeb;
      --border:    #d0d3d8;
      --text:      #0f1419;
      --text2:     #536471;
      --text3:     #8b98a5;
      --accent:    #1d9bf0;
      --accent-h:  #1a8cd8;
      --danger:    #e63946;
      --success:   #22bb66;
      --warn:      #f59e0b;
      --radius:    8px;
      --shadow:    0 2px 12px rgba(0,0,0,0.10);
    }
    [data-theme="dark"] {
      --bg:        #15202b;
      --bg2:       #1e2732;
      --bg3:       #273340;
      --border:    #2f3b49;
      --text:      #e7e9ea;
      --text2:     #8b98a5;
      --text3:     #5b6f80;
      --shadow:    0 2px 12px rgba(0,0,0,0.40);
    }

    /* ── Shell ────────────────────────────────────────────────────────────── */
    body {
      width: 360px;
      min-height: 480px;
      max-height: 600px;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ───────────────────────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px 8px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .logo { font-size: 18px; line-height: 1; }
    .app-name { font-weight: 700; font-size: 15px; letter-spacing: -0.01em; }

    /* ── Nav bar ──────────────────────────────────────────────────────────── */
    .nav {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }
    .nav-btn {
      flex: 1;
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px 4px 6px;
      font-size: 11px;
      color: var(--text2);
      font-family: inherit;
      font-weight: 500;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }
    .nav-btn .nav-icon { font-size: 16px; }
    .nav-btn:hover { color: var(--text); }
    .nav-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* ── Main content area ────────────────────────────────────────────────── */
    #main {
      flex: 1;
      overflow-y: auto;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* ── Search ───────────────────────────────────────────────────────────── */
    .search-wrap {
      position: relative;
    }
    #search {
      width: 100%;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 9999px;
      padding: 7px 14px;
      font-size: 13px;
      color: var(--text);
      font-family: inherit;
      outline: none;
    }
    #search:focus { border-color: var(--accent); background: var(--bg); }
    #search::placeholder { color: var(--text3); }

    /* ── User list ────────────────────────────────────────────────────────── */
    .results { display: flex; flex-direction: column; gap: 4px; }
    .count-label { font-size: 11px; color: var(--text3); padding: 2px 0 4px; }
    .user-list { display: flex; flex-direction: column; gap: 1px; }

    .user-row {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 8px 10px;
      border-radius: var(--radius);
      background: var(--bg2);
      cursor: default;
      transition: background 0.1s;
    }
    .user-row:hover { background: var(--bg3); }

    .user-info { display: flex; align-items: baseline; gap: 6px; }
    .username { font-weight: 600; font-size: 13px; color: var(--text); }
    .display-name { font-size: 11px; color: var(--text2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 160px; }

    .user-tags { display: flex; flex-wrap: wrap; gap: 4px; }
    .tag-pill {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 9999px;
      font-size: 11px;
      font-weight: 500;
      white-space: nowrap;
      max-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Empty state ──────────────────────────────────────────────────────── */
    .empty {
      text-align: center;
      color: var(--text2);
      padding: 28px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      line-height: 1.5;
    }
    .empty-icon { font-size: 32px; margin-bottom: 4px; }
    .empty-sub { font-size: 12px; color: var(--text3); max-width: 220px; }

    .loading { color: var(--text3); text-align: center; padding: 20px; }

    /* ── Section titles ───────────────────────────────────────────────────── */
    .section-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 2px;
    }
    .hint { font-size: 12px; color: var(--text2); line-height: 1.5; }
    .hint-inline { font-size: 11px; color: var(--text3); font-weight: 400; }

    /* ── Import ───────────────────────────────────────────────────────────── */
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 20px;
      text-align: center;
      color: var(--text2);
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      font-size: 13px;
    }
    .drop-zone:hover, .drop-zone.drag-over { border-color: var(--accent); background: var(--bg2); }
    .drop-icon { font-size: 24px; }
    .file-label { color: var(--accent); cursor: pointer; text-decoration: underline; }

    .or-divider {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text3);
      font-size: 11px;
    }
    .or-divider::before, .or-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    textarea {
      width: 100%;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 12px;
      padding: 8px 10px;
      font-family: ui-monospace, monospace;
      resize: vertical;
      outline: none;
      line-height: 1.4;
    }
    textarea:focus { border-color: var(--accent); background: var(--bg); }

    /* ── Preview / result boxes ───────────────────────────────────────────── */
    .preview-box {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .preview-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: var(--text2);
    }
    .preview-row strong { color: var(--text); font-weight: 600; }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 9999px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge-ok   { background: #14532d22; color: var(--success); }
    .badge-warn { background: #78350f22; color: var(--warn); }

    .conflict-opts {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding-top: 4px;
      border-top: 1px solid var(--border);
      margin-top: 4px;
    }

    .error-box   { background: #e6394622; color: var(--danger); padding: 10px 12px; border-radius: var(--radius); font-size: 12px; border: 1px solid #e6394644; }
    .success-box { background: #22bb6622; color: var(--success); padding: 10px 12px; border-radius: var(--radius); font-size: 12px; border: 1px solid #22bb6644; }

    /* ── Action row ───────────────────────────────────────────────────────── */
    .action-row {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      padding-top: 4px;
    }

    .btn-primary, .btn-secondary {
      padding: 7px 16px;
      border-radius: 9999px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      font-family: inherit;
      transition: opacity 0.15s;
    }
    .btn-primary:disabled, .btn-secondary:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary:hover:not(:disabled), .btn-secondary:hover:not(:disabled) { opacity: 0.85; }
    .btn-primary  { background: var(--accent); color: #fff; }
    .btn-secondary { background: var(--bg3); color: var(--text); }

    /* ── Export ───────────────────────────────────────────────────────────── */
    .export-section {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .export-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text2);
    }
    .export-actions { display: flex; gap: 6px; }
    .compact-output { font-size: 11px; word-break: break-all; }

    /* ── Settings ─────────────────────────────────────────────────────────── */
    .setting-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 10px 12px;
      background: var(--bg2);
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }
    .setting-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .radio-group { display: flex; flex-direction: column; gap: 4px; }
    .radio-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      cursor: pointer;
      color: var(--text);
    }
    .radio-label input { accent-color: var(--accent); }
    .toggle-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      cursor: pointer;
      color: var(--text);
    }
    .toggle-label input { accent-color: var(--accent); }
    .settings-status { font-size: 12px; color: var(--success); min-height: 18px; }
    .version-info { font-size: 11px; color: var(--text3); text-align: center; padding-top: 4px; }

    /* ── Scrollbar ────────────────────────────────────────────────────────── */
    #main::-webkit-scrollbar { width: 4px; }
    #main::-webkit-scrollbar-track { background: transparent; }
    #main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  </style>
</head>
<body>
  <header class="header">
    <span class="logo">🏷️</span>
    <span class="app-name">XTagger</span>
  </header>

  <nav class="nav" role="navigation" aria-label="Main navigation">
    <button class="nav-btn active" id="nav-home" aria-label="My tags">
      <span class="nav-icon">🏷️</span>
      Tags
    </button>
    <button class="nav-btn" id="nav-import" aria-label="Import">
      <span class="nav-icon">📥</span>
      Import
    </button>
    <button class="nav-btn" id="nav-export" aria-label="Export">
      <span class="nav-icon">📤</span>
      Export
    </button>
    <button class="nav-btn" id="nav-settings" aria-label="Settings">
      <span class="nav-icon">⚙️</span>
      Settings
    </button>
  </nav>

  <main id="main" role="main">
    <div class="loading">Loading…</div>
  </main>

  <script type="module" src="./main.ts"></script>
</body>
</html>
