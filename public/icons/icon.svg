<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Dark rounded square background -->
  <rect width="128" height="128" rx="24" fill="#1a1d26"/>
  <!-- Gold tag shape: rotated square with notch cut, pointing right -->
  <!-- Tag body -->
  <path d="M20 20 L20 74 L66 120 Q70 124 74 120 L120 74 Q124 70 120 66 L74 20 Z"
        fill="#D4A000"/>
  <!-- Slightly lighter highlight on tag -->
  <path d="M20 20 L20 54 L54 20 Z" fill="#E8B800" opacity="0.4"/>
  <!-- Hole in tag -->
  <circle cx="46" cy="46" r="10" fill="#1a1d26"/>
  <!-- Subtle inner ring on hole -->
  <circle cx="46" cy="46" r="10" fill="none" stroke="#C49000" stroke-width="2"/>
</svg>
