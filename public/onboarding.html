<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome to XTagger</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent:   #1d9bf0;
      --bg:       #15202b;
      --bg2:      #1e2732;
      --bg3:      #273340;
      --border:   #2f3b49;
      --text:     #e7e9ea;
      --text2:    #8b98a5;
      --radius:   12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: 100%;
      max-width: 520px;
      overflow: hidden;
      box-shadow: 0 16px 48px rgba(0,0,0,0.5);
    }

    .card-header {
      background: linear-gradient(135deg, #1a3a5c 0%, #0d2137 100%);
      padding: 32px 36px 24px;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }

    .logo-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .logo { font-size: 36px; }

    .app-name {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .tagline {
      font-size: 14px;
      color: var(--text2);
      line-height: 1.5;
    }

    .card-body {
      padding: 32px 36px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .step-area {
      min-height: 180px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 12px;
    }

    #step-icon {
      font-size: 48px;
      line-height: 1;
    }

    #step-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
    }

    #step-body {
      font-size: 14px;
      color: var(--text2);
      line-height: 1.7;
      max-width: 380px;
    }

    #step-body strong { color: var(--text); font-weight: 600; }
    #step-body em { font-style: normal; color: var(--accent); }

    /* Progress dots */
    .progress {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    #dots {
      display: flex;
      gap: 8px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--bg3);
      border: none;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
      padding: 0;
    }

    .dot.active {
      background: var(--accent);
      transform: scale(1.3);
    }

    .dot:hover:not(.active) { background: var(--border); }

    #step-counter {
      font-size: 11px;
      color: var(--text2);
      min-width: 32px;
    }

    /* Navigation */
    .nav-row {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .btn {
      padding: 10px 24px;
      border-radius: 9999px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      font-family: inherit;
      transition: opacity 0.15s, background 0.15s;
      min-width: 100px;
    }

    .btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .btn:hover:not(:disabled) { opacity: 0.85; }

    .btn-back { background: var(--bg3); color: var(--text2); }
    .btn-next { background: var(--accent); color: #fff; }
    .btn-finish { background: #22bb66; }

    /* Privacy callout */
    .privacy-note {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 12px;
      color: var(--text2);
      line-height: 1.5;
    }

    .privacy-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
    .privacy-note strong { color: var(--text); }
  </style>
</head>
<body>
  <div class="card" role="main">
    <div class="card-header">
      <div class="logo-row">
        <span class="logo">🏷️</span>
        <span class="app-name">XTagger</span>
      </div>
      <p class="tagline">Your personal, private annotation layer for X.com</p>
    </div>

    <div class="card-body">
      <div class="step-area" role="region" aria-live="polite" aria-label="Onboarding step">
        <div id="step-icon" aria-hidden="true"></div>
        <h2 id="step-title"></h2>
        <p id="step-body"></p>
      </div>

      <div class="progress">
        <span id="step-counter" aria-live="polite"></span>
        <div id="dots" role="tablist" aria-label="Steps"></div>
      </div>

      <div class="nav-row">
        <button class="btn btn-back" id="btn-back" aria-label="Previous step">← Back</button>
        <button class="btn btn-next" id="btn-next" aria-label="Next step">Next →</button>
      </div>

      <div class="privacy-note" role="note">
        <span class="privacy-icon">🔒</span>
        <span>
          <strong>100% local &amp; private.</strong>
          Your tags never leave your browser. No accounts, no servers, no tracking.
          Export files live on your device.
        </span>
      </div>
    </div>
  </div>

  <script type="module" src="../src/ui/onboarding/main.ts"></script>
</body>
</html>
